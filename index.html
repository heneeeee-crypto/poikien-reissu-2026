<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<title>Poikien reissu 2026</title>
</head>
<body>
<script>
// =====================
// LOGIN
// =====================
const PASSWORD_HASH = 'fc4c0aa66633bd2701b103a7a0e1491dba2223b213c9f0902117967904ae44e2';
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function login() {
  const pw = prompt('Anna salasana');
  if (!pw) return;
  if (await sha256(pw) === PASSWORD_HASH) {
    sessionStorage.setItem('auth','1');
    ensureGithubToken();
    alert('Kirjautuminen onnistui');
  } else {
    alert('Väärä salasana');
  }
}
// =====================
// GITHUB CONFIG
// =====================
const GITHUB_OWNER = 'heneeeee-crypto';
const GITHUB_REPO = 'poikien-reissu-2026';
const GITHUB_PATH = 'data/data.json';
function ensureGithubToken() {
  if (!sessionStorage.getItem('gh_token')) {
    const t = prompt('Anna GitHub access token (ei tallenneta pysyvästi):');
    if (t) sessionStorage.setItem('gh_token', t.trim());
  }
}
async function loadAll() {
  const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`);
  const json = await res.json();
  const data = JSON.parse(atob(json.content));
  data._sha = json.sha;
  return data;
}
async function saveAll(data, message) {
  const token = sessionStorage.getItem('gh_token');
  if (!token) return alert('Token puuttuu');
  await fetch(
    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`,
    {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({
        message,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
        sha: data._sha
      })
    }
  );
  alert('Tallennettu GitHubiin');
}
(async()=>{ await login(); })();
</script>
</body>
