<body>

<!-- =============================
 LOGIN OVERLAY (ENNALLAAN)
============================= -->
<div id="login-overlay">
  <div class="login-box">
    <div class="lock-icon">🔒</div>
    <div class="login-title">POIKIEN<br>REISSU</div>
    <div class="login-sub">Syötä salasana päästäksesi sisään</div>
    <input class="login-input" type="password" id="login-input"
      placeholder="••••••" onkeydown="if(event.key==='Enter') doLogin()">
    <div class="login-error" id="login-error">Väärä salasana</div>
    <button class="login-btn" onclick="doLogin()">Kirjaudu sisään →</button>
  </div>
</div>

<!-- =============================================
 HERO + TABS + MAIN
 (HTML-RAKENNE KOKONAAN ENNALLAAN)
============================================= -->
<!-- … kaikki alkuperäinen HTML tässä välissä pysyy täysin muuttumattomana … -->

<div class="toast" id="toast"></div>

<!-- =============================================
 JAVASCRIPT
============================================= -->
<script>

/* ================================
 GOOGLE SHEETS BACKEND
================================ */
const SHEETS_API = 'https://script.google.com/macros/s/AKfycbyhn9q19QpuZfj3gozPBTGwq1esK1P3SbOQJdkB-uhN195Wqx9THFnQaEVUF-1uQPb4Zg/exec';

/* ================================
 LOGIN (ENNALLAAN)
================================ */
const PASSWORD_HASH =
  'fc4c0aa66633bd2701b103a7a0e1491dba2223b213c9f0902117967904ae44e2';


function checkLogin() {
  if (sessionStorage.getItem('pr2026_auth') === '1') {
    document.getElementById('login-overlay').style.display = 'none';
    init();
  }
}
function doLogin() {
  if (document.getElementById('login-input').value === PASSWORD) {
    sessionStorage.setItem('pr2026_auth','1');
    document.getElementById('login-overlay').style.display = 'none';
    init();
  } else {
    const e = document.getElementById('login-error');
    e.classList.add('show');
    setTimeout(()=>e.classList.remove('show'),3000);
  }
}
function doLogout() {
  sessionStorage.clear();
  location.reload();
}

/* ================================
 GOOGLE SHEETS DATA
================================ */
const KEYS = {
  destinations: 'destinations',
  dates: 'dates',
  votes_dest: 'votes_dest',
  votes_date: 'votes_date'
};

async function cloudLoad(type) {
  const res = await fetch(`${SHEETS_API}?type=${type}`);
  return await res.json();
}

async function addVote(type, id, sid) {
  await fetch(SHEETS_API, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ type, id, sid })
  });
}

async function removeVote(type, id, sid) {
  await fetch(SHEETS_API, {
    method: 'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({_method:'DELETE', type, id, sid})
  });
}

/* ================================
 ISTUNTOTUNNISTE
================================ */
function getSessionId() {
  let sid = sessionStorage.getItem('pr2026_sid');
  if (!sid) {
    sid = Math.random().toString(36).slice(2)+Date.now().toString(36);
    sessionStorage.setItem('pr2026_sid',sid);
  }
  return sid;
}

/* ================================
 ÄÄNESTYS – KOHTEET
================================ */
async function voteDestination(id) {
  const sid = getSessionId();
  const votes = await cloudLoad(KEYS.votes_dest);
  const already = votes.find(v => v.id == id && v.sid === sid);

  if (already) {
    await removeVote(KEYS.votes_dest, id, sid);
  } else {
    await addVote(KEYS.votes_dest, id, sid);
  }
  renderDestinations();
}

/* ================================
 ÄÄNESTYS – PÄIVÄT
================================ */
async function voteDate(id) {
  const sid = getSessionId();
  const votes = await cloudLoad(KEYS.votes_date);
  const already = votes.find(v => v.id == id && v.sid === sid);

  if (already) {
    await removeVote(KEYS.votes_date, id, sid);
  } else {
    await addVote(KEYS.votes_date, id, sid);
  }
  renderDates();
}

/* ================================
 RENDERIT (ENNALLAAN,
 AINOA MUUTOS: votes haetaan Sheeteistä)
================================ */
async function renderDestinations() {
  const list = await cloudLoad(KEYS.destinations);
  const votes = await cloudLoad(KEYS.votes_dest);
  /* alkuperäinen render-koodi täysin ennallaan */
}

async function renderDates() {
  const list = await cloudLoad(KEYS.dates);
  const votes = await cloudLoad(KEYS.votes_date);
  /* alkuperäinen render-koodi täysin ennallaan */
}

/* ================================
 INIT
================================ */
async function init() {
  await renderDestinations();
  await renderDates();
}
checkLogin();
</script>
</body>
</html>
